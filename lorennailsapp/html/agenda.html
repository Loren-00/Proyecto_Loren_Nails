<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Agenda.css">
    <title>Agenda</title>
</head>
<body>
     <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <img src="../imagenes/logo.png" alt="logo" width="30px" height="30px">
        </div>
            <nav class="menu">
                <ul>
                    <li><a href="../inicio/inicio.html">Inicio</a></li>
                    <li><a href="../html/usuario.html">Usuario</a></li>
                    <li><a href="../html/servicios.html">Servicios</a></li>
                    <li><a href="../html/agenda.html">Agenda</a></li>
                </ul>
            </nav>
    </header>
    

    <div class="container">
        <div class="form-section">
            <form>
                <h2>Agendar Cita</h2>

                <div class="campo">
                    <label for="servicio">Servicio:</label>
                    <select id="servicio" name="servicio" required>
                        <option value="" disabled selected>Seleccione un servicio</option>
                        <option>Manicure convencional</option>
                        <option>Manicure semipermanente</option>
                        <option>Pedicura convencional</option>
                        <option>Pedicura semipermanente</option>
                        <option>Sistema acrílico</option>
                        <option>Sistema polygel</option>
                        <option>Sistema press on</option>
                        <option>Dipping</option>
                        <option>Base rubber</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="fecha">Seleccione una fecha:</label>
                    <input type="date" id="fecha" required>
                </div>

                <div class="campo">
                    <label>Seleccione una hora:</label>
                    <div class="horarios">
                        <button type="button">08:00 a.m</button>
                        <button type="button">09:00 a.m</button>
                        <button type="button">10:00 a.m</button>
                        <button type="button">11:00 a.m</button>
                        <button type="button">12:00 p.m</button>
                        <button type="button">01:00 p.m</button>
                        <button type="button">02:00 p.m</button>
                        <button type="button">03:00 p.m</button>
                        <button type="button">04:00 p.m</button>
                        <button type="button">05:00 p.m</button>
                        <button type="button">06:00 p.m</button>
                        <button type="button">07:00 p.m</button>
                        <button type="button">08:00 p.m</button>
                        <button type="button">09:00 p.m</button>
                    </div>
                </div>

                <button type="submit">Guardar Cita</button>
            </form>
        </div>
    </div>
</body>
</html>
