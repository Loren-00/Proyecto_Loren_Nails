<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Sesión - Loren Nails</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Seccion.css">
</head>
<body>

    <header>
        <div class="brand">Loren <span>Nails</span></div>
        <nav>
            <a href="#">Inicio💅</a>
            <a href="#">Catalogo 💅</a>
            <a href="#">Servicio💅</a>
            <a href="#">Agenda💅</a>
        </nav>
    </header>

    <main>

        
        <div class="panel-form">
            <div class="deco deco-1"></div>
            <div class="deco deco-2"></div>

            <p class="eyebrow">Bienvenida de nuevo</p>
            <h1>Inicio <em>Sesión</em></h1>
            <p class="subtitulo">Accede a tu espacio en Loren Nails</p>

            <form>
                <div class="grupo">
                    <label>Tipo de Usuario</label>
                    <div class="select-wrap">
                        <select required>
                            <option value="">Seleccione...</option>
                            <option>Administrador</option>
                            <option>Cliente</option>
                        </select>
                    </div>
                </div>

                <div class="grupo">
                    <label>Documento de Identidad</label>
                    <input type="text" placeholder="Ingrese su número de documento" required>
                </div>

                <div class="grupo">
                    <label>Fecha de Expedición</label>
                    <input type="date" required>
                </div>

                <button type="submit" class="btn-ingresar">
                    <span>Ingresar</span>
                </button>
            </form>

            <p class="link-help">¿Necesitas ayuda? <a href="#">Contáctanos</a></p>
        </div>

        
        <div class="panel-image">
            <img src="Uñas.jpeg" alt="Loren Nails — diseño de uñas">
            <div class="image-overlay">
                <span class="tag">✦ Loren Nails</span>
                <h2>Arte &amp; elegancia<br>en cada <em>detalle</em></h2>
            </div>
        </div>

    </main>

</body>
</html>
